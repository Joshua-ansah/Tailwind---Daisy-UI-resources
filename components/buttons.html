<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Buttons — Component Library</title>
    <script type="module" src="/src/main.js"></script>
  </head>
  <body class="min-h-screen bg-base-200">
    <header class="bg-base-100 border-b border-base-300 px-6 py-4 flex items-center gap-4">
      <a href="/components/index.html" class="btn btn-ghost btn-sm gap-1">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        Components
      </a>
      <span class="text-base-content/30">/</span>
      <h1 class="font-bold text-base-content">Buttons</h1>
    </header>

    <main class="max-w-5xl mx-auto px-6 py-10 space-y-12">

      <!-- Colour Variants -->
      <section>
        <h2 class="text-lg font-semibold mb-4 text-base-content">Colour Variants</h2>
        <div class="bg-base-100 rounded-2xl p-6 flex flex-wrap gap-3">
          <button class="btn">Default</button>
          <button class="btn btn-primary">Primary</button>
          <button class="btn btn-secondary">Secondary</button>
          <button class="btn btn-accent">Accent</button>
          <button class="btn btn-info">Info</button>
          <button class="btn btn-success">Success</button>
          <button class="btn btn-warning">Warning</button>
          <button class="btn btn-error">Error</button>
          <button class="btn btn-ghost">Ghost</button>
          <button class="btn btn-link">Link</button>
        </div>
      </section>

      <!-- Outline Variants -->
      <section>
        <h2 class="text-lg font-semibold mb-4 text-base-content">Outline Variants</h2>
        <div class="bg-base-100 rounded-2xl p-6 flex flex-wrap gap-3">
          <button class="btn btn-outline">Default</button>
          <button class="btn btn-outline btn-primary">Primary</button>
          <button class="btn btn-outline btn-secondary">Secondary</button>
          <button class="btn btn-outline btn-accent">Accent</button>
          <button class="btn btn-outline btn-info">Info</button>
          <button class="btn btn-outline btn-success">Success</button>
          <button class="btn btn-outline btn-warning">Warning</button>
          <button class="btn btn-outline btn-error">Error</button>
        </div>
      </section>

      <!-- Sizes -->
      <section>
        <h2 class="text-lg font-semibold mb-4 text-base-content">Sizes</h2>
        <div class="bg-base-100 rounded-2xl p-6 flex flex-wrap items-center gap-3">
          <button class="btn btn-primary btn-xs">Extra Small</button>
          <button class="btn btn-primary btn-sm">Small</button>
          <button class="btn btn-primary">Medium</button>
          <button class="btn btn-primary btn-lg">Large</button>
        </div>
      </section>

      <!-- States -->
      <section>
        <h2 class="text-lg font-semibold mb-4 text-base-content">States</h2>
        <div class="bg-base-100 rounded-2xl p-6 flex flex-wrap gap-3">
          <button class="btn btn-primary">Normal</button>
          <button class="btn btn-primary btn-active">Active</button>
          <button class="btn btn-primary" disabled>Disabled</button>
          <button class="btn btn-primary">
            <span class="loading loading-spinner loading-sm"></span>
            Loading
          </button>
        </div>
      </section>

      <!-- Wide & Block -->
      <section>
        <h2 class="text-lg font-semibold mb-4 text-base-content">Wide & Block</h2>
        <div class="bg-base-100 rounded-2xl p-6 space-y-3">
          <div><button class="btn btn-primary btn-wide">Wide Button</button></div>
          <div><button class="btn btn-secondary btn-block">Block (Full Width)</button></div>
        </div>
      </section>

      <!-- Icon Buttons -->
      <section>
        <h2 class="text-lg font-semibold mb-4 text-base-content">Icon Buttons</h2>
        <div class="bg-base-100 rounded-2xl p-6 flex flex-wrap gap-3">
          <!-- Square icon -->
          <button class="btn btn-square btn-primary">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
          </button>
          <!-- Circle icon -->
          <button class="btn btn-circle btn-secondary">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
          </button>
          <!-- Icon + label -->
          <button class="btn btn-accent gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
            Upload
          </button>
          <!-- Outline circle -->
          <button class="btn btn-circle btn-outline btn-error">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
          </button>
        </div>
      </section>

      <!-- Button Group (Join) -->
      <section>
        <h2 class="text-lg font-semibold mb-4 text-base-content">Button Group (Join)</h2>
        <div class="bg-base-100 rounded-2xl p-6 flex flex-wrap gap-6">
          <div class="join">
            <button class="btn join-item">Left</button>
            <button class="btn join-item btn-active">Center</button>
            <button class="btn join-item">Right</button>
          </div>
          <div class="join">
            <button class="btn btn-primary join-item">Save</button>
            <button class="btn btn-primary join-item">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
            </button>
          </div>
          <div class="join">
            <input class="join-item btn" type="radio" name="view" aria-label="List" checked />
            <input class="join-item btn" type="radio" name="view" aria-label="Grid" />
            <input class="join-item btn" type="radio" name="view" aria-label="Map" />
          </div>
        </div>
      </section>

    </main>
  </body>
</html>
